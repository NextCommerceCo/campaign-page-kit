<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} · {{ campaign.name }}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 640px; margin: 40px auto; padding: 0 24px; color: #1a1a2e; }
  h1 { margin-bottom: 8px; }
  .meta { color: #666; font-size: 14px; margin-bottom: 24px; }
  .cta { display: inline-block; background: #0ea5e9; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; }
  .cta:hover { background: #0284c7; }
  .secondary { color: #666; margin-left: 12px; font-size: 14px; }
</style>
</head>
<body>
<div class="meta">{{ campaign.name }} · {{ page_type }}</div>
{{ content }}
</body>
</html>
